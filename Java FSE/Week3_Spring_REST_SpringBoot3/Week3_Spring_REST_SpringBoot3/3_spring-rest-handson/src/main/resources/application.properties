spring.application.name=spring-rest-handson-advanced
server.port=8082

# Content Negotiation - support JSON and XML
spring.mvc.contentnegotiation.favor-parameter=true
spring.mvc.contentnegotiation.parameter-name=format
spring.mvc.contentnegotiation.media-types.json=application/json
spring.mvc.contentnegotiation.media-types.xml=application/xml

# Actuator - expose all endpoints for monitoring
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true

# App info
info.app.name=Country REST API
info.app.version=1.0.0
info.app.description=DN 5.0 Week 3 Hands-On

logging.level.com.cognizant=DEBUG
