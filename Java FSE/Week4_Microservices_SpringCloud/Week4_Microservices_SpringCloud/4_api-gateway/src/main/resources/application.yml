spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true          # Auto-create routes from Eureka service names
          lower-case-service-id: true
      routes:
        - id: account-service
          uri: lb://account-service      # lb = load-balanced via Eureka
          predicates:
            - Path=/accounts/**
        - id: loan-service
          uri: lb://loan-service
          predicates:
            - Path=/loans/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
